<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Training Companion</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9fafb;color:#111;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding:12px 12px 80px}
.header{text-align:center;margin-bottom:12px}
.header h1{font-size:18px;font-weight:700;color:#111}
.header p{font-size:10px;color:#9ca3af}
/* Week bar */
.week-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px;margin-bottom:10px}
.week-info{flex:1}
.week-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.week-badge.build{background:#dbeafe;color:#1e40af}
.week-badge.deload{background:#fef3c7;color:#92400e}
.week-note{font-size:10px;color:#6b7280;margin-top:3px}
.week-btns{display:flex;gap:4px}
.week-btn{width:28px;height:28px;border-radius:50%;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.week-btn.off{background:#f3f4f6;color:#6b7280}
.week-btn.on{background:#3b82f6;color:#fff}
.week-btn.deload-on{background:#f59e0b;color:#fff}
/* Day selector */
.days{display:flex;gap:4px;margin-bottom:10px}
.day-btn{flex:1;border:none;border-radius:8px;padding:8px 2px;text-align:center;cursor:pointer;transition:all .15s;position:relative;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.day-btn.sel{background:#111;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.day-btn.today:not(.sel){box-shadow:0 0 0 2px #60a5fa}
.day-btn .dl{font-size:11px;font-weight:700}
.day-btn .dt{font-size:7px;margin-top:2px;opacity:.6}
.day-btn .miss-dot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;background:#f59e0b;border-radius:50%}
/* Guardrails */
.guard-btn{width:100%;text-align:left;font-size:12px;padding:8px 12px;margin-bottom:10px;border-radius:8px;background:#fef2f2;color:#b91c1c;border:none;cursor:pointer;font-weight:500}
.guard-box{margin-bottom:10px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px;font-size:11px;color:#991b1b;line-height:1.6}
/* Day card */
.day-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.day-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.day-head .emoji{font-size:20px}
.day-head h2{font-size:18px;font-weight:700}
.day-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px}
.day-sum{font-size:12px;color:#6b7280;margin-bottom:12px}
.missed-banner{font-size:11px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:6px 10px;margin-bottom:10px;font-weight:500}
/* Block card */
.block{border-left:4px solid #d1d5db;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;transition:opacity .15s}
.block.missed{opacity:.45}
.block-head{display:flex;align-items:center;gap:8px}
.miss-btn{width:24px;height:24px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#d1d5db;flex-shrink:0;transition:all .15s}
.miss-btn.on{background:#fee2e2;border-color:#f87171;color:#dc2626}
.block-main{flex:1;cursor:pointer}
.block-title{display:flex;align-items:center;gap:6px}
.block-title .icon{font-size:14px}
.block-title .name{font-size:13px;font-weight:600;color:#111}
.block-title .name.struck{text-decoration:line-through;color:#9ca3af}
.block-dur{font-size:11px;color:#6b7280;margin-left:22px}
.block-expand{font-size:11px;color:#9ca3af;cursor:pointer;flex-shrink:0}
/* Alternatives */
.alt-box{margin:8px 0 0 32px;background:rgba(251,191,36,.15);border:1px solid #fcd34d;border-radius:8px;padding:10px}
.alt-title{font-size:11px;font-weight:700;color:#92400e;margin-bottom:6px}
.alt-item{margin-bottom:6px}
.alt-item:last-child{margin-bottom:0}
.alt-name{font-size:11px;font-weight:600;color:#78350f}
.alt-time{font-size:9px;background:#fde68a;color:#92400e;padding:1px 6px;border-radius:4px;margin-left:4px}
.alt-desc{font-size:10px;color:#92400e;margin-top:2px}
/* Detail content */
.block-detail{margin:8px 0 0 24px}
.block-notes{font-size:11px;color:#374151;white-space:pre-wrap;line-height:1.5}
.group-label{font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-top:8px;margin-bottom:4px}
.ex-item{border-left:2px solid #e5e7eb;padding:4px 0 4px 10px;margin-bottom:2px}
.ex-head{display:flex;align-items:flex-start;gap:6px;cursor:pointer}
.ex-name{font-size:12px;font-weight:500;color:#111}
.ex-detail{font-size:11px;color:#6b7280;margin-left:4px}
.ex-deload{font-size:10px;color:#d97706;margin-left:4px}
.vid-btn{flex-shrink:0;font-size:9px;background:#fef2f2;color:#dc2626;padding:2px 6px;border-radius:4px;text-decoration:none;border:none;cursor:pointer}
.vid-btn:hover{background:#fee2e2}
.ex-expand{font-size:11px;color:#6b7280;margin-top:3px}
.ex-expand b{color:#4b5563}
.ex-expand em{font-style:italic}
.emom-btn{font-size:11px;color:#4f46e5;font-weight:500;background:none;border:none;cursor:pointer;margin-top:8px;padding:0}
.emom-box{margin-top:4px;font-size:11px;color:#4b5563;background:#eef2ff;padding:8px;border-radius:6px;white-space:pre-wrap}
/* Footer */
.footer{margin-top:16px;text-align:center;font-size:9px;color:#9ca3af;line-height:1.6}
.hint{margin-top:12px;text-align:center;font-size:10px;color:#9ca3af}
/* Color classes for block borders */
.bc-amber{border-color:#fbbf24;background:#fffbeb}
.bc-sky{border-color:#7dd3fc;background:#f0f9ff}
.bc-blue{border-color:#60a5fa;background:#eff6ff}
.bc-orange{border-color:#fb923c;background:#fff7ed}
.bc-purple{border-color:#a78bfa;background:#f5f3ff}
.bc-red{border-color:#f87171;background:#fef2f2}
.bc-pink{border-color:#f472b6;background:#fdf2f8}

.bc-slate{border-color:#94a3b8;background:#f8fafc}
.bc-indigo{border-color:#818cf8;background:#eef2ff}
/* Tag colors */
.tc-emerald{background:#d1fae5;color:#065f46}
.tc-blue{background:#dbeafe;color:#1e40af}

  },
};

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const ICONS = { swim:"\uD83C\uDFCA", bike:"\uD83D\uDEB4", strength:"\uD83D\uDCAA", pt:"\uD83E\uDDB5", core:"\uD83C\uDFAF", rest:"\uD83D\uDE34", other:"\uD83D\uDCCB" };

function ExItem({ ex, deload }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="ex-item">
      <div className="ex-head" onClick={() => setOpen(!open)}>
        <div style={{flex:1}}>
          <span className="ex-name">{ex.name}</span>
          <span className="ex-detail">{ex.detail}</span>
          {deload && <span className="ex-deload">(~50%)</span>}
        </div>
        <a href={YT(ex.yt||ex.name)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} className="vid-btn">{"\u25B6"} Vid</a>
      </div>
      {open && <div className="ex-expand">
        {ex.muscles && <div><b>Target:</b> {ex.muscles}</div>}
        {ex.note && <div><em>{ex.note}</em></div>}
      </div>}
    </div>
  );
}

function BlockCard({ block, deload, missed, onToggle }) {
  const [open, setOpen] = useState(false);
  const [showEmom, setShowEmom] = useState(false);

  return (
    <div className={`block bc-${block.color} ${missed?"missed":""}`}>
      <div className="block-head">
        {block.skippable && (
          <button className={`miss-btn ${missed?"on":""}`} onClick={()=>onToggle(block.id)}>
            {missed ? "\u2715" : "\u2713"}
          </button>
        )}
        <div className="block-main" onClick={()=>setOpen(!open)}>
          <div className="block-title">
            <span className="icon">{ICONS[block.type]||"\uD83D\uDCCB"}</span>
            <span className={`name ${missed?"struck":""}`}>{block.title}</span>
          </div>
          <div className="block-dur">{block.duration}{deload && block.type==="strength" ? " (deload ~50%)" : ""}</div>
        </div>
        {(block.exercises||block.notes||block.alternatives) &&
          <span className="block-expand" onClick={()=>setOpen(!open)}>{open?"\u25BE":"\u25B8"}</span>}
      </div>

      {missed && block.alternatives && block.alternatives.length > 0 && (
        <div className="alt-box">
          <div className="alt-title">{"\u26A1"} Do instead:</div>
          {block.alternatives.map((a,i) => (
            <div key={i} className="alt-item">
              <span className="alt-name">{a.name}</span>
              <span className="alt-time">{a.time}</span>
              <div className="alt-desc">{a.desc}</div>
            </div>
          ))}
        </div>
      )}

      {open && !missed && (
        <div className="block-detail">
          {block.exercises ? (
            <div>
              {block.exercises.map(g => (
                <div key={g.id}>
                  <div className="group-label">{g.label}</div>
                  {g.items.map((ex,i) => <ExItem key={i} ex={ex} deload={deload} />)}
                </div>
              ))}
              {block.emom && <div>
                <button className="emom-btn" onClick={()=>setShowEmom(!showEmom)}>
                  {showEmom ? "\u25BE Hide EMOM" : "\u25B8 EMOM alternative"}
                </button>
                {showEmom && <pre className="emom-box">{block.emom}</pre>}
              </div>}
            </div>
          ) : block.notes ? (
            <pre className="block-notes">{block.notes}</pre>
          ) : null}
        </div>
      )}
    </div>
  );
}

function App() {
  const todayIdx = new Date().getDay();
  const todayKey = DAYS[todayIdx === 0 ? 6 : todayIdx - 1];
  const [sel, setSel] = useState(todayKey);
  const [week, setWeek] = useState(1);
  const [missed, setMissed] = useState({});
  const [showGuard, setShowGuard] = useState(false);

  const toggle = useCallback((id) => setMissed(p => ({...p, [id]: !p[id]})), []);

  const day = DAYS_DATA[sel];
  const mc = day.blocks.filter(b => missed[b.id]).length;
  const dl = week === 4;

  return (
    <div className="app">
      <div className="header">
        <h1>Training Companion</h1>
        <p>Tap day {"\u2192"} expand blocks {"\u2192"} tap exercises for video {"\u2022"} Mark missed {"\u2192"} see alternatives</p>
      </div>

      <div className="week-bar">
        <div className="week-info">
          <span className={`week-badge ${dl?"deload":"build"}`}>
            {dl ? "Week 4 \u2014 Deload" : `Week ${week}/4 \u2014 Build`}
          </span>
          <div className="week-note">
            {dl ? "~50% sets/reps. Halve HIIT intervals." : "+1 rep per session \u2192 top of range \u2192 add load."}
          </div>
        </div>
        <div className="week-btns">
          {[1,2,3,4].map(w => (
            <button key={w} onClick={()=>setWeek(w)}
              className={`week-btn ${week===w ? (w===4?"deload-on":"on") : "off"}`}>{w}</button>
          ))}
        </div>
      </div>

      <div className="days">
        {DAYS.map(d => {
          const dd = DAYS_DATA[d];
          const hasMiss = dd.blocks.some(b => missed[b.id]);
          return (
            <button key={d} onClick={()=>setSel(d)}
              className={`day-btn ${d===sel?"sel":""} ${d===todayKey&&d!==sel?"today":""}`}>
              <div className="dl">{d}</div>
              <div className="dt">{dd.emoji} {dd.tag.replace("P90X ","").replace("REST + ","")}</div>
              {hasMiss && <div className="miss-dot"/>}
            </button>
          );
        })}
      </div>

      <button className="guard-btn" onClick={()=>setShowGuard(!showGuard)}>
        {showGuard ? "\u25BE" : "\u25B8"} Guardrails & Safety
      </button>
      {showGuard && (
        <div className="guard-box">
          {"\u2022"} Max 2 HIIT/week (Mon bike, Fri swim)<br/>
          {"\u2022"} Knees: cadence 100{"\u2013"}110 rpm, no grinding. Stop if pain &gt;4/10 or swelling &gt;24{"\u2013"}48h<br/>
          {"\u2022"} WHOOP &lt;60% {"\u2192"} easy/technique only<br/>
          {"\u2022"} P90X: 1{"\u2013"}2 RIR always. Scale Sat if Fri was brutal<br/>
          {"\u2022"} Deload wk 4: ~50% volume, halve HIIT reps<br/>
          {"\u2022"} Freestyle/backstroke only {"\u2014"} no breaststroke kick
        </div>
      )}

      <div className="day-card">
        <div className="day-head">
          <span className="emoji">{day.emoji}</span>
          <h2>{day.label}</h2>
          <span className={`day-tag ${day.tagCls}`}>{day.tag}</span>
        </div>
        <div className="day-sum">{day.summary}</div>

        {mc > 0 && (
          <div className="missed-banner">
            {"\u26A1"} {mc} block{mc>1?"s":""} missed {"\u2014"} alternatives shown. Tap {"\u2715"} to undo.
          </div>
        )}

        {day.blocks.map(b => (
          <BlockCard key={b.id} block={b} deload={dl} missed={!!missed[b.id]} onToggle={toggle} />
        ))}

        {day.blocks.some(b=>b.skippable) && !mc && (
          <div className="hint">Tap the circle to mark a block as missed {"\u2192"} alternatives appear</div>
        )}
      </div>

      <div className="footer">
        Tempo: 3-0-1 = 3s down, 0 pause, 1s up {"\u2022"} RPE 7{"\u2013"}8 {"\u2022"} Rest 45{"\u2013"}60s<br/>
        Pull-up bar: Tue + Sat P90X {"\u2022"} Rows: Thu only {"\u2022"} Core: Tue + Thu + Sat
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
